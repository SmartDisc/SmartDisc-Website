name: Deploy to Server (new)

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  deploy:
    name: Trigger remote deploy
    runs-on: ubuntu-latest
    environment: server
    steps:
      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools

      - name: Setup WireGuard tunnel
        run: |
          sudo mkdir -p /etc/wireguard
          printf "[Interface]\nPrivateKey = %s\nAddress = %s\nDNS = 1.1.1.1\n\n[Peer]\nPublicKey = %s\nAllowedIPs = %s\nEndpoint = %s\nPersistentKeepalive = 25\n" \
            "${{ secrets.WG_PRIVATE_KEY }}" \
            "${{ secrets.WG_PEER_IP }}" \
            "${{ secrets.WG_SERVER_PUBLIC_KEY }}" \
            "10.8.0.0/24" \
            "${{ secrets.WG_SERVER_ENDPOINT }}" | sudo tee /etc/wireguard/ghactions.conf

          sudo wg-quick up ghactions
      - name: Debug WireGuard + network path
        run: |
          echo "=== WireGuard status ==="
          sudo wg show
          echo "=== IP routes ==="
          ip route
          echo "=== Testing SSH host/port ==="
          nc -zv ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }}
          echo "=== Done ==="

      - name: Trigger deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ghdeploy
          key: ${{ secrets.SSHKEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Deploy triggered from GitHub"

      - name: Teardown WireGuard
        if: always()
        run: sudo wg-quick down ghactions
